"$schema" = "./node_modules/wrangler/config-schema.json"

name = "llm-gateway"
pages_build_output_dir = "."
compatibility_date = "2026-06-29"

# ponytail: runtime defaults live in _worker.js so Pages Variables / Secrets can override them.
# Supported names: ADMIN_TOKEN, API_KEY_CRYPT_SECRET, REQUEST_TIMEOUT_MS,
# UPSTREAM_COOLDOWN_TTL, MODEL_CACHE_TTL, UPSTREAMS_JSON, CLIENTS_JSON.

# Required for the admin page.
# [[kv_namespaces]]
# binding = "KV"
# id = "<YOUR_KV_NAMESPACE_ID>"
