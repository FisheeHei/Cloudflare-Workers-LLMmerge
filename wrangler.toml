"$schema" = "./node_modules/wrangler/config-schema.json"

name = "llm-gateway"
compatibility_date = "2026-06-29"

# ponytail: keep this file local-only for `wrangler pages dev`.
# Do not set `pages_build_output_dir` here, so Pages production config stays managed in Cloudflare.
# Configure production Variables / Secrets in the Workers & Pages dashboard instead.
# Supported runtime names: ADMIN_TOKEN, API_KEY_CRYPT_SECRET, REQUEST_TIMEOUT_MS,
# UPSTREAM_COOLDOWN_TTL, MODEL_CACHE_TTL, UPSTREAMS_JSON, CLIENTS_JSON.

# Optional local binding for `wrangler pages dev`.
# [[kv_namespaces]]
# binding = "KV"
# id = "<YOUR_KV_NAMESPACE_ID>"
